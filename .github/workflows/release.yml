name: Auto Release C++ Engine Dump

on:
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract C++ Engine Structure and Stats
        id: info
        run: |
          if [ -f "Dumps/Offsets.hpp" ]; then
            FILE="Dumps/Offsets.hpp"
          else
            FILE="Offsets.hpp"
          fi

          echo "Using file: $FILE"

          # 1. Extract Roblox version string
          VERSION=$(grep -oP 'version-[a-f0-9]+' "$FILE" | head -n 1)
          if [ -z "$VERSION" ]; then
            VERSION="v$(date +'%Y.%m.%d-%H%M')"
          fi

          # 2. Count detected C++ namespaces or structural blocks
          NAMESPACE_COUNT=$(grep -c 'namespace' "$FILE" || echo "0")

          # 3. Count total internal C++ functions/variables defined in the file
          CPP_ELEMENT_COUNT=$(grep -E '(uintptr_t|void|int|unsigned|struct|class)' "$FILE" | wc -l)

          # 4. Extract specific C++ names/keywords to show in the release notes
          CPP_SAMPLES=$(grep -E '(uintptr_t|void|int)' "$FILE" | head -n 20 | sed 's/^[ \t]*//' | tr '\n' ',' | sed 's/,$//')

          # 5. Get file size metrics
          FILE_SIZE=$(du -sh "$FILE" | cut -f1)

          # Output variables to GitHub environment
          echo "VERSION=$VERSION"               >> $GITHUB_OUTPUT
          echo "NAMESPACE_COUNT=$NAMESPACE_COUNT" >> $GITHUB_OUTPUT
          echo "CPP_ELEMENT_COUNT=$CPP_ELEMENT_COUNT" >> $GITHUB_OUTPUT
          echo "CPP_SAMPLES=$CPP_SAMPLES"       >> $GITHUB_OUTPUT
          echo "FILE=$FILE"                     >> $GITHUB_OUTPUT
          echo "FILE_SIZE=$FILE_SIZE"           >> $GITHUB_OUTPUT

      - name: Delete existing release (if any)
        run: |
          gh release delete "${{ steps.info.outputs.VERSION }}" --yes 2>/dev/null || true
          git push --delete origin "${{ steps.info.outputs.VERSION }}" 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.info.outputs.VERSION }}
          name: "Roblox C++ Engine Dump — ${{ steps.info.outputs.VERSION }}"
          body: |
            ## Automated C++ Engine Architecture Release

            | Metadata Field | Value |
            |----------------|-------|
            | **Roblox Target Version** | `${{ steps.info.outputs.VERSION }}` |
            | **Engine Namespaces** | `${{ steps.info.outputs.NAMESPACE_COUNT }}` |
            | **Total C++ Definitions** | `${{ steps.info.outputs.CPP_ELEMENT_COUNT }}` |
            | **Header File Size** | `${{ steps.info.outputs.FILE_SIZE }}` |
            | **Release Trigger** | Manual Workflow Run |

            ### Sample C++ Identifiers Found
            ```cpp
            // Samples of extracted engine elements:
            // \${{ steps.info.outputs.CPP_SAMPLES }}
            ```

            ### Architecture Usage
            Review the attached header file to inspect exposed internal namespaces, engine class mappings, and runtime execution definitions.
          files: |
            ${{ steps.info.outputs.FILE }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
